<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Sistema Pastelería</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>
<body>

<div class="login-container">

    <div class="login-card">

        <h1>D'CONSA</h1>
        <p class="subtitulo">
        Sistema de Ventas
        </p>

        <form id="loginForm">

            <input
                type="text"
                id="usuario"
                placeholder="Usuario"
                required
            >

            <div class="password-container">

                <input
                    type="password"
                    id="password"
                    placeholder="Contraseña"
                    required
                >

                <span id="togglePassword">
                    👁️
                </span>

            </div>

            <button type="submit">
                Ingresar
            </button>

        </form>

        <p id="mensaje"></p>

    </div>

</div>

<script src="js/login.js"></script>
<script src="js/usuarioSidebar.js"></script>


</body>
</html>
