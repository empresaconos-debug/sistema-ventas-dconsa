<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Usuarios</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/sidebar.css">

</head>

<body>

<div id="sidebar-container"></div>

<div class="main">

    <div class="page-header">

        <h1 class="page-title">
            👥 Usuarios
        </h1>

        <p class="page-subtitle">
            Gestión de usuarios del sistema
        </p>

    </div>

    <div class="card">

        <div class="form-row">

            <div class="form-group">

                <label>Nombre</label>

                <input
                    type="text"
                    id="nombre"
                >

            </div>

            <div class="form-group">

                <label>Usuario</label>

                <input
                    type="text"
                    id="usuario"
                >

            </div>

        </div>

        <div class="form-row">

            <div class="form-group">

                <label>Contraseña</label>

                <input
                    type="password"
                    id="password"
                >

            </div>

            <div class="form-group">

                <label>Rol</label>

                <select id="rol">

                    <option value="ADMIN">
                        ADMIN
                    </option>

                    <option value="TIENDA">
                        TIENDA
                    </option>

                </select>

            </div>

        </div>

        <div class="form-group">

            <label>Tienda</label>

            <select id="tienda">

                <option value="">
                    Sin tienda
                </option>

                <option value="1">
                    CONO 1
                </option>

                <option value="2">
                    CONO 2
                </option>

                <option value="3">
                    CONO 3
                </option>

            </select>

        </div>

        <button
            class="btn"
            onclick="guardarUsuario()"
        >
            Guardar
        </button>

    </div>

    <div class="card">

        <table class="table">

            <thead>

                <tr>

                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Usuario</th>
                    <th>Rol</th>
                    <th>Tienda</th>
                    <th>Estado</th>
                    <th>Acciones</th>

                </tr>

            </thead>

            <tbody id="tablaUsuarios">

            </tbody>

        </table>

    </div>

</div>

<script src="js/auth.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/usuarioSidebar.js"></script>
<script src="js/usuarios.js"></script>
<script src="js/logout.js"></script>

</body>
</html>
