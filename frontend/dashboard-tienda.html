<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Panel Usuario</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

<link rel="stylesheet" href="css/global.css">
<link rel="stylesheet" href="css/sidebar.css">

</head>

<body>

<div id="sidebar-container"></div>

<div class="main">

    <h1 class="page-title">
        Dashboard Tienda
    </h1>

    <div
        id="dashboardResumen"
        class="cards"
    >

        <div class="card">

            <h3>
                🧾 Ventas
            </h3>

            <h2 id="totalVentas">
                0
            </h2>

        </div>

        <div class="card">

            <h3>
                💰 S/ Vendido
            </h3>

            <h2 id="totalVendido">
                S/ 0.00
            </h2>

        </div>

        <div class="card">

            <h3>
                ⭐ Producto Estrella
            </h3>

            <h2 id="productoEstrella">
                -
            </h2>

        </div>

    </div>

    <div class="card">

        <h3>
            📈 Ventas del Día
        </h3>

        <div
            style="height:300px;"
        >

            <canvas
                id="graficoVentasDia"
            ></canvas>

        </div>

    </div>
    
    <div class="card">

        <h3>
            📊 Ventas del Mes
        </h3>

        <div
            style="height:300px;"
        >

            <canvas
                id="graficoVentasMes"
            ></canvas>

        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="js/auth.js"></script>
<script src="js/logout.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/usuarioSidebar.js"></script>
<script src="js/dashboard-tienda.js"></script>

</body>
</html>
